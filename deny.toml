# Configuration for `cargo deny check` (advisories, licenses, bans, sources).
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Deny dependencies pulled in by a yanked crate version.
yanked = "deny"
ignore = [
    # `paste` is unmaintained/archived (RUSTSEC-2024-0436 is an "unmaintained"
    # notice, not a vulnerability). It is a build-time proc-macro pulled in
    # transitively by `dcbor` (our canonical-CBOR dependency — see ADR-0002),
    # generates no runtime code path we ship, and has no known CVE. Revisit if
    # dcbor drops it or moves to a maintained fork (e.g. `pastey`).
    "RUSTSEC-2024-0436",
]

[licenses]
# cargo-deny denies any license not on this list (and therefore the entire
# GPL family — GPL, LGPL, AGPL, etc. — is denied by omission).
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",         # arrayref (via blake3)
    "BSD-2-Clause-Patent",  # dcbor (canonical CBOR, ADR-0002)
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",          # unicode-ident (via proc-macro2)
    "Zlib",                 # sqlite-wasm-rs — wasm-only transitive dep of rusqlite,
                            # never compiled in our native builds; permissive,
                            # GPL-compatible, OSI-approved.
    "MPL-2.0",              # uniffi + uniffi_* (ADR-0007, mobile FFI bindings).
                            # File-level (weak) copyleft: obligations attach only
                            # to modifications of the MPL-licensed files
                            # themselves, not to code that links against them —
                            # compatible with our Apache-2.0/MIT dual license.
]
confidence-threshold = 0.8

[bans]
# Warn (don't fail) on multiple versions of the same crate in the dependency
# graph; revisit if it gets noisy.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
