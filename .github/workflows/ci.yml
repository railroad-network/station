name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          cache-bin: true
      - run: cargo install cargo-fuzz --locked
      # Compile all targets, then run each as a 60s smoke check (not full
      # fuzzing — the ≥1h-per-target pass is the gated audit-prep workflow).
      # `-max_total_time` caps the work; a target that panics fails the job.
      - run: cargo +nightly fuzz build
      - run: cargo +nightly fuzz run verify_signature    -- -max_total_time=60
      - run: cargo +nightly fuzz run canonical_roundtrip -- -max_total_time=60
      - run: cargo +nightly fuzz run hash_chain          -- -max_total_time=60
      - run: cargo +nightly fuzz run log_replay          -- -max_total_time=60
      - run: cargo +nightly fuzz run state_machine       -- -max_total_time=60
      - run: cargo +nightly fuzz run shamir_reconstruct  -- -max_total_time=60
      - run: cargo +nightly fuzz run wallet_decrypt      -- -max_total_time=60
      - run: cargo +nightly fuzz run address_parse       -- -max_total_time=60

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
      - run: cargo install cargo-tarpaulin --locked
      # Tarpaulin is run on Linux for the official numbers (it is unreliable on
      # macOS). HTML + LCOV are uploaded as a build artifact rather than
      # committed — coverage reports are large and noisy in git (T0.7.2).
      #
      # --engine llvm: the default ptrace engine times out ("Timed out waiting
      # for test response") on the multi-threaded tokio e2e tests (gossip/IPC
      # daemons in two_station_e2e, ipc, backup_recover, cli_e2e). LLVM
      # source-based coverage doesn't trace syscalls, so it handles async +
      # networking reliably. --timeout covers the cross-station convergence waits.
      - run: cargo tarpaulin --workspace --engine llvm --timeout 300 --out Html --out Lcov --output-dir target/coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/
